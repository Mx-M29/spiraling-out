<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spiraling out</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Canvas */
        #simulationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            display: block;
            background: white;
            cursor: grab;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #simulationCanvas:active {
            cursor: grabbing;
        }

        .toolbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .toolbar button {
            background: transparent;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
            color: #333;
            transition: all 0.2s ease;
        }

        .toolbar button:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .toolbar button:active {
            transform: scale(0.96);
        }

        .toolbar .divider {
            width: 1px;
            background: #e0e0e0;
            margin: 0 4px;
        }

        /* Floating help button */
        .help-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            color: #888;
            border: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            z-index: 150;
        }

        .help-button:hover {
            background: #333;
        }

        .help-button:active {
            transform: scale(0.95);
        }

        /* Help modal */
        .help-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .help-modal.show {
            display: flex;
        }

        .help-modal-content {
            background: white;
            border-radius: 16px;
            width: 80%;
            max-width: 800px;
            height: 60%;
            max-height: 500px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .help-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e8e8e8;
        }

        .help-modal-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .close-help {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-help:hover {
            color: #000;
        }

        .help-modal-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .help-sidebar {
            width: 160px;
            border-right: 1px solid #e8e8e8;
            padding: 16px 0;
            overflow-y: auto;
        }

        .help-piece-btn {
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s ease;
        }

        .help-piece-btn:hover {
            background: #f5f5f5;
        }

        .help-piece-btn.active {
            background: #f0f0f0;
            font-weight: 600;
            border-left: 3px solid #000;
        }

        .help-content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            line-height: 1.5;
            font-size: 14px;
        }

        /* Right side sliding panel */
        .config-panel {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 40%;
            max-width: 500px;
            min-width: 320px;
            background: white;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.08);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e8e8e8;
        }

        .config-panel.open {
            transform: translateX(0);
        }

        .panel-lip {
            position: absolute;
            left: -32px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 80px;
            background: white;
            border-radius: 8px 0 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.1);
            border: 1px solid #e8e8e8;
            border-right: none;
            z-index: 202;
        }

        .panel-lip:hover {
            background: #f8f8f8;
        }

        .panel-lip svg {
            width: 16px;
            height: 16px;
            stroke: #666;
            stroke-width: 2;
            transition: transform 0.3s ease;
        }

        .config-panel.open .panel-lip svg {
            transform: rotate(180deg);
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            border-bottom: none;
            background: white;
            flex-shrink: 0;
            height: 52px;
            position: relative;
        }

        .tab-bar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: #e8e8e8;
            z-index: 0;
        }

        .tab {
            flex: 1;
            padding: 16px 20px;
            background: white;
            z-index: 1;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #888;
            transition: color 0.2s ease;
            height: 52px;
            position: relative;
        }

        .tab.active {
            color: #000;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #000;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }

        .tab-pane {
            display: none;
            min-height: 400px;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form elements */
        .param-group {
            margin-bottom: 24px;
        }

        .param-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 8px;
        }

        .param-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s ease;
        }

        .param-group input:focus {
            outline: none;
            border-color: #000;
        }

        /* Piece list */
        .piece-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .piece-item {
            background: #fafafa;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        .piece-item.dragging {
            opacity: 0.4;
        }

        .piece-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
            margin-bottom: 12px;
            cursor: grab;
        }

        .piece-header:active {
            cursor: grabbing;
        }

        .drag-handle {
            color: #bbb;
            font-size: 16px;
            cursor: grab;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .piece-type-select {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            background: white;
        }

        .remove-piece {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .remove-piece:hover {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .color-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            align-items: center;
        }

        .color-channel {
            flex: 1;
        }

        .color-channel span {
            font-size: 11px;
            color: #999;
            display: block;
            margin-bottom: 4px;
        }

        .color-channel input {
            width: 100%;
            padding: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
        }

        .color-channel input:focus {
            outline: none;
        }

        .color-preview-swatch {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: #fff;
            flex-shrink: 0;
        }

        .movement-section {
            margin-top: 8px;
        }

        .movement-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 6px;
        }

        .movement-points {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .movement-point {
            display: flex;
            gap: 4px;
            align-items: center;
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .movement-point input {
            width: 45px;
            padding: 4px;
            border: none;
            text-align: center;
            font-size: 12px;
        }

        .movement-point input:focus {
            outline: none;
        }

        .movement-range {
            display: flex;
            gap: 4px;
            align-items: center;
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .movement-range input {
            width: 100%;
            padding: 4px;
            border: none;
            text-align: center;
            font-size: 12px;
        }

        .movement-range input:focus {
            outline: none;
        }

        .add-movement {
            background: none;
            border: 1px dashed #ccc;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            color: #888;
        }

        .add-movement:hover {
            border-color: #000;
            color: #000;
        }

        .add-piece-btn {
            width: 100%;
            padding: 12px;
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .add-piece-btn:hover {
            background: #f0f0f0;
            border-color: #ccc;
        }

        .simulate-container {
            padding: 16px 20px 20px 20px;
            border-top: 1px solid #e8e8e8;
            background: white;
            flex-shrink: 0;
        }

        .simulate-btn {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .simulate-btn:hover {
            background: #222;
            transform: translateY(-1px);
        }

        .simulate-btn:active {
            transform: translateY(0);
        }

        .section-title {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 16px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #f0f0f0;
        }

        /* Enemy assignment table */
        .enemy-matrix {
            width: 100%;
            overflow-x: auto;
        }

        .enemy-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .enemy-table th,
        .enemy-table td {
            padding: 0;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .enemy-table th {
            background: #fafafa;
            font-weight: 500;
            padding: 12px 8px;
            vertical-align: top;
        }

        .enemy-table th .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 2px;
            vertical-align: middle;
            border: 1px solid #e0e0e0;
        }

        .enemy-table td.first-col {
            width: 60px;
            min-width: 60px;
            max-width: 60px;
            background: #fafafa;
            font-weight: 500;
            text-align: left;
            padding: 12px;
            vertical-align: middle;
        }

        .enemy-table td.first-col .color-dot-small {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 2px;
            vertical-align: middle;
            border: 1px solid #e0e0e0;
        }

        .enemy-table td:not(.first-col) {
            padding: 0;
            width: auto;
        }

        .enemy-bit-cell {
            padding: 0 !important;
            position: relative;
        }

        .enemy-bit-cell {
            aspect-ratio: 1 / 1;
        }

        .enemy-bit {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s ease;
            margin: 0;
            width: 100%;
            height: 100%;
            border-radius: 0;
        }

        .enemy-bit.active {
            background: #888;
            color: white;
        }

        .enemy-bit.inactive {
            background: #f5f5f5;
            color: #ccc;
        }

        .enemy-bit:hover {
            filter: brightness(0.95);
        }

        .status {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            border-radius: 40px;
            font-size: 14px;
            z-index: 150;
            pointer-events: none;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .status.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <canvas id="simulationCanvas"></canvas>

    <div class="toolbar">
        <button id="zoomOutBtn">Zoom Out</button>
        <button id="zoomInBtn">Zoom In</button>
        <div class="divider"></div>
        <button id="resetViewBtn">Reset View</button>
        <div class="divider"></div>
        <button id="downloadBtn">Download PNG</button>
    </div>

    <button id="helpButton" class="help-button">?</button>

    <div id="helpModal" class="help-modal">
        <div class="help-modal-content">
            <div class="help-modal-header">
                <h2>About the Simulator</h2>
                <button id="closeHelpBtn" class="close-help">×</button>
            </div>
            <div class="help-modal-body">
                <div class="help-sidebar">
                    <button class="help-piece-btn active" data-piece="overview">Overview</button>
                    <button class="help-piece-btn" data-piece="N">Knight (N)</button>
                    <button class="help-piece-btn" data-piece="B">Bishop (B)</button>
                    <button class="help-piece-btn" data-piece="R">Rook (R)</button>
                    <button class="help-piece-btn" data-piece="Q">Queen (Q)</button>
                    <button class="help-piece-btn" data-piece="K">King (K)</button>
                    <button class="help-piece-btn" data-piece="T">Taxi (T)</button>
                    <button class="help-piece-btn" data-piece="C">Custom (C)</button>
                    <button class="help-piece-btn" data-piece="enemies">Enemies</button>
                </div>
                <div class="help-content" id="helpContent">
                    <!-- Content will be populated here -->
                </div>
            </div>
        </div>
    </div>
    
    <div class="config-panel" id="configPanel">
        <div class="panel-lip" id="panelLip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </div>

        <div class="tab-bar">
            <button class="tab active" data-tab="pieces">Pieces</button>
            <button class="tab" data-tab="enemies">Enemies</button>
        </div>

        <div class="tab-content">
            <!-- Pieces Tab -->
            <div class="tab-pane active" id="piecesTab">
                <div class="param-group">
                    <label>Spiral loops</label>
                    <input type="number" id="ring" min="10" max="1000" value="500">
                </div>
                <div class="param-group">
                    <label>Rectangularity</label>
                    <input type="number" id="rect" min="0" max="30" value="0">
                </div>
                
                <hr>
                
                <div class="section-title">Pieces</div>
                <div id="piecesContainer" class="piece-list"></div>
                <button id="addPieceBtn" class="add-piece-btn">+ Add Piece</button>
            </div>

            <!-- Enemies Tab -->
            <div class="tab-pane" id="enemiesTab">
                <div class="section-title">Enemy Assignment</div>
                <div id="enemyMatrix" class="enemy-matrix"></div>
                <div style="margin-top: 16px; font-size: 12px; color: #999;">
                    Each button represents whether the row piece attacks the column piece.
                </div>
            </div>
        </div>

        <div class="simulate-container">
            <button id="simulateBtn" class="simulate-btn">Run Simulation</button>
        </div>
    </div>

    <div class="status" id="status">Initializing...</div>

    <script src="knights_module.js"></script>
    <script>
        // ========== GLOBALS ==========
        let module = null;
        let pieces = [];
        let dragIndex = null;
        let canvas = document.getElementById('simulationCanvas');
        let ctx = canvas.getContext('2d');
        let statusTimeout = null;
        
        // Viewport state
        let zoom = 1;
        let panX = 0, panY = 0;
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        
        // Panel state
        let panelOpen = true;
        
        // ========== MODULE INIT ==========
        function updateStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');

            if (statusTimeout) {
                clearTimeout(statusTimeout);
            }
            
            statusDiv.textContent = msg;
            statusDiv.style.background = isError ? 'rgba(231, 76, 60, 0.9)' : 'rgba(0, 0, 0, 0.85)';
            
            statusDiv.classList.add('visible');
            
            statusTimeout = setTimeout(() => {
                statusDiv.classList.remove('visible');
            }, 2000);
        }
        
        function loadModule() {
            if (typeof Module !== 'undefined') {
                if (Module.ready) {
                    onModuleReady();
                } else {
                    Module.onRuntimeInitialized = onModuleReady;
                }
            } else {
                setTimeout(loadModule, 100);
            }
        }
        
        function onModuleReady() {
            module = Module;
            updateStatus('Module ready');
            addPieceWithDefaults();
            addPieceWithDefaults();
            updatePiece(pieces[0].id, { color: {r: 0, g: 0, b: 0}, enemies: "10" });
            updatePiece(pieces[1].id, { color: {r: 255, g: 0, b: 0}, enemies: "01" });
            renderAll();
        }
        
        // ========== PIECES DATA ==========
        const pieceTypeNames = {
            N: 'Knight', B: 'Bishop', R: 'Rook', Q: 'Queen', K: 'King', T: 'Taxi', C: 'Custom'
        };
        
        function normalizeEnemiesStrings() {
            const pieceCount = pieces.length;
            pieces.forEach(piece => {
                let enemiesInt = parseInt(piece.enemies, 2) || 0;
                const mask = (1 << pieceCount) - 1;
                enemiesInt = enemiesInt & mask;
                piece.enemies = enemiesInt.toString(2).padStart(pieceCount, '0');
            });
        }

        function addPieceWithDefaults() {
            if (pieces.length >= 32) {
                updateStatus('Maximum 32 pieces reached', true);
                return;
            }
            const id = Date.now() + Math.random();
            const newIndex = pieces.length;

            let enemiesString = '1'.repeat(pieces.length);
            pieces.push({
                id: id,
                type: 'N',
                color: { r: 255, g: 100, b: 100 },
                enemies: enemiesString,
                movement: [{ x: 2, y: 1 }]
            });

            pieces.forEach(piece => {
                if (piece.id === id)
                    piece.enemies = '0' + piece.enemies;
                else
                    piece.enemies = '1' + piece.enemies;
            });

            normalizeEnemiesStrings();
            renderAll();
        }
        
        function removePiece(id) {
            if (pieces.length <= 1) {
                updateStatus('Cannot delete the last piece', true);
                return;
            }

            const indexToRemove = pieces.findIndex(p => p.id === id);
            pieces = pieces.filter(p => p.id !== id);
            
            // Remove the corresponding bit from all remaining pieces' enemies strings
            pieces.forEach(piece => {
                let enemiesInt = parseInt(piece.enemies, 2) || 0;
                const mask = (1 << indexToRemove) - 1;
                const higherBits = enemiesInt >> (indexToRemove + 1);
                const lowerBits = enemiesInt & mask;
                const newEnemiesInt = (higherBits << indexToRemove) | lowerBits;
                piece.enemies = newEnemiesInt.toString(2).padStart(pieces.length, '0');
            });
            
            renderAll();
        }
        
        function updatePiece(id, updates) {
            const piece = pieces.find(p => p.id === id);
            if (piece) {
                Object.assign(piece, updates);
                renderAll();
            }
        }
        
        function updateMovementPoint(pieceId, pointIndex, axis, value) {
            const piece = pieces.find(p => p.id === pieceId);
            if (piece && piece.movement[pointIndex]) {
                let newValue = parseInt(value) || 0;
                if (newValue < -20) {
                    newValue = -20;
                } else if (newValue > 20) {
                    newValue = 20
                }
                piece.movement[pointIndex][axis] = newValue;
                renderAll();
            }
        }
        
        function addMovementPoint(pieceId) {
            const piece = pieces.find(p => p.id === pieceId);
            if (piece && piece.type === 'C') {
                piece.movement.push({ x: 0, y: 0 });
                renderAll();
            }
        }
        
        function removeMovementPoint(pieceId, pointIndex) {
            const piece = pieces.find(p => p.id === pieceId);
            if (piece && piece.type === 'C' && piece.movement.length > 1) {
                piece.movement.splice(pointIndex, 1);
                renderAll();
            }
        }
        
        function reorderPieces(fromIndex, toIndex) {
            const allEnemies = pieces.map(piece => piece.enemies);
            const newPieces = [...pieces];
            const [moved] = newPieces.splice(fromIndex, 1);
            newPieces.splice(toIndex, 0, moved);
            newPieces.forEach((piece, idx) => {
                piece.enemies = allEnemies[idx];
            });

            pieces = newPieces;
            renderAll();
        }
        
        // ========== ENEMY MATRIX ==========
        function updateEnemyBit(pieceId, attackerIndex, bitValue) {
            const piece = pieces.find(p => p.id === pieceId);
            if (piece) {
                let enemies = parseInt(piece.enemies, 2) || 0;
                if (bitValue) {
                    enemies |= (1 << attackerIndex);
                } else {
                    enemies &= ~(1 << attackerIndex);
                }
                piece.enemies = enemies.toString(2).padStart(pieces.length, '0');
                renderAll();
            }
        }

                    addBtn.style.cursor = 'not-allowed';
                } else {
                    addBtn.disabled = false;
                    addBtn.style.opacity = '1';
                    addBtn.style.cursor = 'pointer';
                }
            }

            renderPiecesList();
            renderEnemyMatrix();
        }

        // ========== SIMULATION ==========
        function runSimulation() {
            if (!module) {
                updateStatus('Module not ready', true);
                return;
            }
            
            let ring = parseInt(document.getElementById('ring').value);
            if (ring < 10) {
                ring = 10;
                document.getElementById('ring').value = "10";
            } else if (ring > 1000) {
                ring = 1000;
                document.getElementById('ring').value = "1000";
            }
            let rect = parseInt(document.getElementById('rect').value);
            if (rect < 0) {
                rect = 0;
                document.getElementById('rect').value = "0";
            } else if (rect > 30) {
                rect = 30;
                document.getElementById('rect').value = "30";
            }
            
            updateStatus('Running simulation...');
            
            setTimeout(() => {
                try {
                    const piecesData = pieces.map(piece => ({
                        type: piece.type,
                        color: { r: piece.color.r, g: piece.color.g, b: piece.color.b },
                        enemies: piece.enemies,
                        movement: piece.movement
                    }));
                    
                    const imageDataArray = module.runSimulation(ring, rect, piecesData);
                    const totalPixels = imageDataArray.length / 4;
                    const size = 2 * ring + 1;
                    const scale = Math.min(window.innerWidth / (size + rect), window.innerHeight / size) * 0.8;
                    canvas.style.width = `${(size + rect) * scale}px`;
                    canvas.style.height = `${size * scale}px`;
                    canvas.width = size + rect;
                    canvas.height = size;
                    
                    const imageData = new ImageData(new Uint8ClampedArray(imageDataArray), size + rect, size);
                    ctx.putImageData(imageData, 0, 0);
                    
                    zoom = 1;
                    panX = 0;
                    panY = 0;
                    updateCanvasTransform();
                    
                    updateStatus('Complete');
                } catch (err) {
                    updateStatus('Error: ' + err.message, true);
                    console.error(err);
                }
            }, 10);
        }
        
        // ========== CANVAS INTERACTIONS ==========
        function updateCanvasTransform() {
            canvas.style.transform = `translate(calc(50vw - 50%), calc(50vh - 50%)) scale(${zoom}) translate(${panX}px, ${panY}px)`;
        }
        
        function setupCanvasInteractions() {
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                zoom *= delta;
                zoom = Math.min(Math.max(zoom, 0.2), 8);
                updateCanvasTransform();
            });
            
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragStartX = e.clientX - panX;
                dragStartY = e.clientY - panY;
                canvas.style.cursor = 'grabbing';
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                panX = e.clientX - dragStartX;
                panY = e.clientY - dragStartY;
                updateCanvasTransform();
            });
            
            window.addEventListener('mouseup', () => {
                isDragging = false;
                canvas.style.cursor = 'grab';
            });
            
            canvas.width = 0; canvas.height = 0;
            canvas.style.cursor = 'grab';
        }
        
        function zoomIn() {
            zoom = Math.min(zoom + 1, 8);
            updateCanvasTransform();
        }
        
        function zoomOut() {
            zoom = Math.max(zoom - 1, 1);
            updateCanvasTransform();
        }
        
        function resetView() {
            zoom = 1;
            panX = 0;
            panY = 0;
            updateCanvasTransform();
        }

        function downloadCanvasAsImage() {
            if (!canvas.width || !canvas.height) {
                updateStatus('No image to download', true);
                return;
            }
            
            try {
                const link = document.createElement('a');
                
                // For PNG (lossless, no quality parameter needed)
                const dataURL = canvas.toDataURL('image/png');
                
                // Generate filename with timestamp and dimensions
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = `spiral_${canvas.width}x${canvas.height}_${timestamp}.png`;
                link.href = dataURL;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                updateStatus(`Downloaded PNG`);
            } catch (error) {
                updateStatus('Download failed: ' + error.message, true);
                console.error(error);
            }
        }

            document.querySelectorAll('.tab-pane').forEach(pane => {

                    <h3>Examples</h3>
                    <div style="display: flex; justify-content: center; width: 100%;">
                        <img src="assets/custom_targets.gif" alt="Custom targets" style="height: 300px;">
                    </div>
                    <p>The previous gif shows four examples of custom pieces. The first one is defined by the movement points 
                        (-1, 2), (2, 1), (-2, 0), and (1, -2). I won't describe the other ones, you get the idea.</p>
                `,
                enemies: `
                    <h3>Enemies</h3>
                    <p>In the "Enemies" tab of the side menu one will find the enemy matrix. This matrix specifies the 
                        relationships between different pieces. Selecting a button in this matrix means that the row piece 
                        will be able to attack the column piece. In other words, if during the simulation an empty square 
                        is being targeted by a row piece, then a column piece will not be allowed to be placed there.</p>
                    <p>These relationships don't have to be symmetric and a piece could even attack itself, though I don't 
                        recommend the latter because it leaves a lot of empty spaces.</p>
                `
            };
            
            contentDiv.innerHTML = explanations[pieceType] || explanations.overview;
            contentDiv.scrollTop = 0;
        }

        function setupHelpMenu() {
            // Open modal
            document.getElementById('helpButton').addEventListener('click', showHelpModal);
            
            // Close modal
            document.getElementById('closeHelpBtn').addEventListener('click', hideHelpModal);
            
            // Close when clicking outside modal content
            document.getElementById('helpModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('helpModal')) {
                    hideHelpModal();
                }
            });
            
            // Piece buttons
            const pieceBtns = document.querySelectorAll('.help-piece-btn');
            pieceBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active state
                    pieceBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update content
                    const pieceType = btn.dataset.piece;
                    updateHelpContent(pieceType);
                });
            });
            
            // Initialize with overview
            updateHelpContent('overview');
        }
        
        // ========== INITIALIZE ==========
        function init() {
            setupCanvasInteractions();
            setupHelpMenu();
            
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
            document.getElementById('resetViewBtn').addEventListener('click', resetView);
            document.getElementById('downloadBtn').addEventListener('click', downloadCanvasAsImage);
            document.getElementById('simulateBtn').addEventListener('click', runSimulation);
            document.getElementById('addPieceBtn').addEventListener('click', addPieceWithDefaults);
            document.getElementById('panelLip').addEventListener('click', togglePanel);
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });
            
            document.getElementById('configPanel').classList.remove('open');
            
            loadModule();
        }
        
        init();
    </script>
</body>
</html>
